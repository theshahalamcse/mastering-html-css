<!--About css height and width with explanation and examples-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Height and Width</title>
    <style>
      .box {
        width: 200px;
        height: 100px;
        background-color: lightcoral;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <h2>CSS Height and Width</h2>

    <p>
      The <code>width</code> property sets the width of an element, while the
      <code>height</code> property sets the height. Both properties can take
      values in various units such as pixels (px), percentages (%), em, rem,
      etc.
    </p>

    <div class="box">This box has a width of 200px and a height of 100px.</div>
  </body>
</html>
