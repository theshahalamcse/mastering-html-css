<!--About Paragraphs Tags-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Paragraphs</title>
    <!--inline css-->
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #2c3e50;
      }
      p {
        color: #34495e;
        font-size: 16px;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <h1>HTML Paragraphs</h1>
    <!--Html P Tag Explanation-->
    <p>
      The &lt;p&gt; tag defines a paragraph in HTML. Paragraphs are block-level
      elements, and they automatically add some space before and after them.
    </p>
  </body>
</html>
